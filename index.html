<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Design 인터랙션 라이브러리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@400;600;800&family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero" id="hero">
    <p class="hero-kicker" data-reveal>APPLE WWDC 디자인 원칙 / 인터랙션 계기반</p>
    <h1 class="hero-title" data-reveal>동작하는<br>디자인 언어.</h1>
    <p class="hero-sub" data-reveal>스프링 물리, 제스처, 모멘텀. 원칙을 읽지 말고 만져보세요 — 코드는 그대로 복사해 가세요.</p>
  </header>
  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <ul class="sidebar-list" id="sidebar-list"></ul>
    </nav>
    <main class="panel">
      <h2 class="panel-title" id="panel-title"></h2>
      <p class="panel-principle" id="panel-principle"></p>
      <div class="demo-stage" id="demo-stage"></div>
      <div class="code-section">
        <button class="code-toggle" id="code-toggle">코드 보기</button>
        <div class="code-block" id="code-block" hidden>
          <button class="copy-btn" id="copy-btn">복사</button>
          <pre><code id="code-content"></code></pre>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
